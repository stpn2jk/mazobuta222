<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 레퍼럴 페이지</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1e1e24; 
            color: #ffffff;
            position: relative; /* 언어 선택기 배치를 위해 추가 */
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 40px; /* 상단 언어 선택기 공간 확보 */
        }

        /* --- 언어 선택기 (우측 상단) --- */
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            background: #2a2a35;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        .lang-selector a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            transition: color 0.2s;
        }

        .lang-selector a:hover, .lang-selector a.active {
            color: #7b61ff;
        }

        /* --- 상단 메인 버튼 --- */
        .top-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 320px;
            height: 70px;
            background-color: #2a2a35;
            border: 2px solid #444;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .main-btn:hover {
            transform: translateY(-5px);
            border-color: #7b61ff;
        }

        .main-btn img {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            border-radius: 8px;
            background-color: #555; 
            object-fit: cover;
        }

        /* --- 캐릭터 카드 그리드 --- */
        .card-grid {
            display: grid;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .card-grid { grid-template-columns: repeat(5, 1fr); }
        }

        @media (max-width: 767px) {
            .card-grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 10px; 
            }
            .main-btn { width: 100%; }
        }

        .card {
            background: #2a2a35;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #7b61ff;
        }

        /* 세로로 긴 이미지 비율 (3:4) 설정 */
        .card-image {
            width: 100%;
            aspect-ratio: 3 / 4; 
            background-color: #444; 
            border-radius: 8px;
            margin-bottom: 12px;
            object-fit: cover;
        }

        .card-title {
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            margin: 0 0 8px 0;
            text-align: center;
            word-break: keep-all;
        }

        .card-desc {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 15px;
            text-align: center;
            flex-grow: 1; 
            line-height: 1.4;
        }

        .card-btn {
            display: block;
            text-align: center;
            padding: 10px 0;
            background-color: #7b61ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="lang-selector">
    <a href="index.html" class="active">KO</a>
    <a href="index_en.html">EN</a>
    <a href="index_ja.html">JA</a>
</div>

<div class="container">
    <div class="top-buttons">
        <a href="https://rplay.live/c/mazobuta" target="_blank" class="main-btn">
            <img src="" alt="RPlay">
            알플레이 (RPlay)
        </a>
        <a href="https://storyengine.live/c/mazobuta" target="_blank" class="main-btn">
            <img src="" alt="StoryEngine">
            스토리엔진 (StoryEngine)
        </a>
    </div>

    <div class="card-grid">
        <div class="card">
            <img src="rei.png" alt="Rei" class="card-image">
            <h3 class="card-title">Rei</h3>
            <p class="card-desc">캐릭터 설명을 적어주세요.</p>
            <a href="https://rplay.live/story/69ae7e2145c779b27702e4f8?ref=rei" target="_blank" class="card-btn">채팅하기</a>
        </div>
        </div>
</div>

</body>
</html>
