<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 레퍼럴 페이지</title>
    <style>
        /* 기본 스타일 초기화 및 폰트 설정 */
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1e1e24; /* 다크 테마 배경 */
            color: #ffffff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- 상단 메인 버튼 섹션 --- */
        .top-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 320px;
            height: 70px;
            background-color: #2a2a35;
            border: 2px solid #444;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .main-btn:hover {
            transform: translateY(-5px);
            border-color: #7b61ff;
            background-color: #323240;
        }

        /* 버튼 내 이미지 자리표시자 */
        .main-btn img {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            border-radius: 8px;
            background-color: #555; /* 이미지 없을 때 기본 배경색 */
            object-fit: cover;
        }

        /* --- 하단 캐릭터 카드 그리드 섹션 --- */
        .card-grid {
            display: grid;
            gap: 15px;
        }

        /* 데스크탑 기준 (가로 768px 이상일 때 5줄) */
        @media (min-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* 모바일 기준 (가로 767px 이하일 때 3줄) */
        @media (max-width: 767px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px; /* 모바일에서는 여백을 조금 줄임 */
            }
            .main-btn {
                width: 100%; /* 모바일에서는 상단 버튼이 꽉 차게 */
            }
        }

        /* 카드 디자인 */
        .card {
            background: #2a2a35;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #7b61ff;
        }

        /* 카드 내 캐릭터 이미지 자리표시자 */
        .card-image {
            width: 100%;
            aspect-ratio: 1 / 1; /* 정사각형 비율 유지 */
            background-color: #444; 
            border-radius: 8px;
            margin-bottom: 12px;
            object-fit: cover;
        }

        .card-title {
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            margin: 0 0 8px 0;
            text-align: center;
            word-break: keep-all;
        }

        .card-desc {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 15px;
            text-align: center;
            flex-grow: 1; /* 설명이 짧아도 버튼이 아래에 고정되게 함 */
            line-height: 1.4;
        }

        .card-btn {
            display: block;
            text-align: center;
            padding: 10px 0;
            background-color: #7b61ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .card-btn:hover {
            background-color: #6a4fe6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-buttons">
        <a href="https://rplay.live/c/mazobuta" target="_blank" class="main-btn">
            <img src="" alt="알플레이 이미지">
            알플레이 (RPlay)
        </a>
        <a href="https://storyengine.live/c/mazobuta" target="_blank" class="main-btn">
            <img src="" alt="스토리엔진 이미지">
            스토리엔진 (StoryEngine)
        </a>
    </div>

    <div class="card-grid">
        
        <div class="card">
            <img src="" alt="Rei" class="card-image">
            <h3 class="card-title">Rei</h3>
            <p class="card-desc">캐릭터에 대한 간단한 설명을 여기에 적어주세요.</p>
            <a href="https://rplay.live/story/69ae7e2145c779b27702e4f8?ref=rei" target="_blank" class="card-btn">채팅하기</a>
        </div>

        <div class="card">
            <img src="" alt="Leveldrain" class="card-image">
            <h3 class="card-title">Leveldrain</h3>
            <p class="card-desc">캐릭터에 대한 간단한 설명을 여기에 적어주세요.</p>
            <a href="https://rplay.live/story/6925f034c8f17edf74d85a7e?ref=leveldrain" target="_blank" class="card-btn">채팅하기</a>
        </div>

        <div class="card">
            <img src="" alt="Succubus Milking Farm" class="card-image">
            <h3 class="card-title">Succubus Milking Farm</h3>
            <p class="card-desc">캐릭터에 대한 간단한 설명을 여기에 적어주세요.</p>
            <a href="https://rplay.live/story/6883b3237f4b8ed828d716f2?ref=Succubus Milking Farm" target="_blank" class="card-btn">채팅하기</a>
        </div>

        </div>
</div>

</body>
</html>
